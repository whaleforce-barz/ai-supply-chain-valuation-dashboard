name: Deploy Static Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://filebrowser.aws.whaleforce.ai
      FILEBROWSER_USER: barz-hsu
      REMOTE_PATH: static-sites/ai-supply-chain-valuation-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload static files
        run: |
          curl -fsS \
            -F "path=${REMOTE_PATH}" \
            -F "files=@./index.html;filename=index.html" \
            -F "files=@./styles.css;filename=styles.css" \
            -F "files=@./app.js;filename=app.js" \
            -F "files=@./ai_supply_chain_valuation_screen.csv;filename=ai_supply_chain_valuation_screen.csv" \
            -F "files=@./ai_supply_chain_valuation_assessment.md;filename=ai_supply_chain_valuation_assessment.md" \
            "${BASE_URL}/api/users/${FILEBROWSER_USER}/upload"

      - name: Verify deployment
        run: |
          SITE_URL="${BASE_URL}/${FILEBROWSER_USER}/${REMOTE_PATH}/index.html"
          CSV_URL="${BASE_URL}/${FILEBROWSER_USER}/${REMOTE_PATH}/ai_supply_chain_valuation_screen.csv"
          curl -L -fsS "$SITE_URL" >/dev/null
          curl -L -fsS "$CSV_URL" >/dev/null
          echo "site_url=$SITE_URL" >> "$GITHUB_STEP_SUMMARY"
